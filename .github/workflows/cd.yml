name: VNShop CD

on:
  workflow_run:
    workflows: ["VNShop CI"]
    types: [completed]
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/vnshop

jobs:
  detect-changes:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.event.workflow_run.head_sha }}~1
          ref: ${{ github.event.workflow_run.head_sha }}
          filters: |
            api-gateway:
              - 'services/api-gateway/**'
            cart-service:
              - 'services/cart-service/**'
            configuration-service:
              - 'services/configuration-service/**'
            coupon-service:
              - 'services/coupon-service/**'
            inventory-service:
              - 'services/inventory-service/**'
            messaging-service:
              - 'services/messaging-service/**'
            monitoring-service-v2:
              - 'services/monitoring-service-v2/**'
            notification-service:
              - 'services/notification-service/**'
            order-service:
              - 'services/order-service/**'
            payment-service:
              - 'services/payment-service/**'
            product-service:
              - 'services/product-service/**'
            recommendations-service:
              - 'services/recommendations-service/**'
            search-service:
              - 'services/search-service/**'
            seller-finance-service:
              - 'services/seller-finance-service/**'
            shipping-service:
              - 'services/shipping-service/**'
            user-service:
              - 'services/user-service/**'

  build-push:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest
            type=raw,value=v{{date 'YYYY-MM-DD'}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  update-manifests:
    needs: [detect-changes, build-push]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update staging kustomization image tags
        run: |
          SHA_SHORT=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          SERVICES='${{ needs.detect-changes.outputs.services }}'

          for SERVICE in $(echo "$SERVICES" | jq -r '.[]'); do
            IMAGE="${{ env.IMAGE_PREFIX }}-${SERVICE}"
            # Update image tag in staging kustomization
            cd infra/k8s/overlays/staging
            if grep -q "name: ${IMAGE}" kustomization.yaml 2>/dev/null; then
              sed -i "s|newTag:.*# ${SERVICE}|newTag: sha-${SHA_SHORT} # ${SERVICE}|" kustomization.yaml
            else
              echo "  - name: ${IMAGE}" >> kustomization.yaml
              echo "    newTag: sha-${SHA_SHORT} # ${SERVICE}" >> kustomization.yaml
            fi
            cd ../../../..
          done

      - name: Commit manifest updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/overlays/staging/
          git diff --staged --quiet || git commit -m "ci: update staging image tags to sha-$(echo ${{ github.event.workflow_run.head_sha }} | cut -c1-7)"
          git push
