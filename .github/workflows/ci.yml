name: VNShop CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MAVEN_OPTS: -Dmaven.repo.local=${{ github.workspace }}/.m2/repository

jobs:
  # ── Detect what changed ──
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      java: ${{ steps.filter.outputs.java }}
      node: ${{ steps.filter.outputs.node }}
      any: ${{ steps.filter.outputs.any }}
    steps:
      - uses: actions/checkout@v4

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            java:
              - 'services/api-gateway/**'
              - 'services/user-service/**'
              - 'services/product-service/**'
              - 'services/inventory-service/**'
              - 'services/search-service/**'
              - 'services/order-service/**'
              - 'services/payment-service/**'
              - 'services/shipping-service/**'
              - '.github/workflows/ci.yml'
            node:
              - 'services/notification-service/**'
              - 'services/cart-service/**'
              - '.github/workflows/ci.yml'
            any:
              - '**'

  # ── Java service matrix ──
  java-tests:
    name: Java test (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.java == 'true' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - user-service
          - product-service
          - inventory-service
          - search-service
          - order-service
          - payment-service
          - shipping-service
    defaults:
      run:
        working-directory: services/${{ matrix.service }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Cache local Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-${{ runner.os }}-

      - name: Maven test (unit only)
        run: mvn --batch-mode test -DskipTests=false -Djacoco.skip=true "-Dtest=!*ApplicationTests" "-Dsurefire.failIfNoSpecifiedTests=false"

  # ── Node service matrix ──
  node-tests:
    name: Node test (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.node == 'true' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        service:
          - notification-service
          - cart-service
    defaults:
      run:
        working-directory: services/${{ matrix.service }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install, test, build
        run: |
          npm ci
          npm test -- --coverage --passWithNoTests
          npm run build

  # ── Dependency check (separate stage, run on one representative service) ──
  dependency-check:
    name: OWASP dependency check
    runs-on: ubuntu-latest
    needs: [java-tests, node-tests]
    if: always() && (needs.changes.outputs.java == 'true' || github.event_name == 'workflow_dispatch')
    defaults:
      run:
        working-directory: services/inventory-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Cache local Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-${{ runner.os }}-

      - name: OWASP dependency check
        run: mvn --batch-mode org.owasp:dependency-check-maven:12.1.9:check -DfailBuildOnCVSS=7 -DknownExploitedEnabled=false

      - name: Upload dependency check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: |
            services/*/target/dependency-check-report.*
          if-no-files-found: ignore

  # ── Docker build + Trivy scan (parallel per service) ──
  docker-scan:
    name: Docker scan (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: java-tests
    if: needs.changes.outputs.java == 'true' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - user-service
          - product-service
          - inventory-service
          - search-service
          - order-service
          - payment-service
          - shipping-service

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f services/${{ matrix.service }}/Dockerfile -t vnshop/${{ matrix.service }}:${{ github.sha }} .

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: vnshop/${{ matrix.service }}:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'

  # ── Eslint check (notification service only) ──
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.node == 'true' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: services/notification-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: services/notification-service/package-lock.json

      - name: Install & lint
        run: |
          npm ci
          npx eslint "{src,apps,libs,test}/**/*.ts" --max-warnings=0

  # ── Coverage summary & gate ──
  coverage-gate:
    name: Coverage gate
    runs-on: ubuntu-latest
    needs: [java-tests, node-tests]
    if: always()
    steps:
      - name: Summarize
        run: |
          echo "Java services enforce 90% instruction coverage through jacoco:check during mvn verify."
          echo "Node services enforce coverage thresholds via Jest coverageThreshold."
