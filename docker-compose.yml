    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    container_name: vnshop-payment-service
    ports:
      - "8092:8092"
    depends_on:
      postgres-payment:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      configuration-service:
        condition: service_healthy
    environment:
      SERVER_PORT: 8092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-payment:5432/vnshop_payment?currentSchema=payment_svc
      SPRING_DATASOURCE_USERNAME: vnshop
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-vnshop}
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KEYCLOAK_ISSUER_URI: http://localhost:8085/realms/vnshop
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/vnshop/protocol/openid-connect/certs
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
      OTEL_TRACES_SAMPLER: parentbased_traceidratio
      OTEL_TRACES_SAMPLER_ARG: "1.0"
      # Per-method enable flags. Defaults: COD + VietQR on; VNPay/MoMo/Stripe/PayPal off.
      # Flip the matching env var to "true" once the provider's creds land in .env.
      COD_ENABLED: ${COD_ENABLED:-true}
      VIETQR_ENABLED: ${VIETQR_ENABLED:-true}
      VNPAY_ENABLED: ${VNPAY_ENABLED:-false}
      MOMO_ENABLED: ${MOMO_ENABLED:-false}
      STRIPE_ENABLED: ${STRIPE_ENABLED:-false}
      PAYPAL_ENABLED: ${PAYPAL_ENABLED:-false}
      # VietQR target bank — buyer scans, transfers from their bank app,
      # admin manually confirms via POST /admin/vietqr/confirm/{paymentId}.
      # Defaults VCB; replace with real account or leave empty to disable.
      VIETQR_BANK_BIN: ${VIETQR_BANK_BIN:-970436}
      VIETQR_ACCOUNT_NO: ${VIETQR_ACCOUNT_NO:-}
      VIETQR_ACCOUNT_NAME: ${VIETQR_ACCOUNT_NAME:-}
      # Stripe credentials (sandbox keys from dashboard.stripe.com/test/apikeys).
      # STRIPE_WEBHOOK_SECRET comes from `stripe listen` and rotates per session.
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      # PayPal v2 Checkout REST credentials (sandbox creds at developer.paypal.com).
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID:-}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET:-}
      PAYPAL_MODE: ${PAYPAL_MODE:-sandbox}
      # SePay outbound polling for VietQR auto-confirm.
      SEPAY_API_KEY: ${SEPAY_API_KEY:-}
      SEPAY_ACCOUNT_ID: ${SEPAY_ACCOUNT_ID:-}
      SEPAY_ENABLED: ${SEPAY_ENABLED:-false}
      # FX provider for Stripe/PayPal (USD conversion).
      FX_FALLBACK_RATE: ${FX_FALLBACK_RATE:-25500}
      # Kafka SASL/PLAIN credentials for payment-service.
      KAFKA_SECURITY_PROTOCOL: SASL_PLAINTEXT
      KAFKA_SASL_USERNAME: svc-payment
      KAFKA_SASL_PASSWORD: ${KAFKA_SVC_PAYMENT_PASSWORD:?KAFKA_SVC_PAYMENT_PASSWORD must be set}
    volumes:
      - ./infra/kafka/certs/kafka.truststore.jks:/etc/kafka/secrets/kafka.truststore.jks:ro
    deploy:
      resources:
        limits:
          memory: 768M

  shipping-service:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: services/shipping-service/Dockerfile
    container_name: vnshop-shipping-service
    ports:
      - "8093:8093"
    depends_on:
      postgres-shipping:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      configuration-service:
        condition: service_healthy
    environment:
      SERVER_PORT: 8093
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-shipping:5432/vnshop_shipping?currentSchema=shipping_svc
      SPRING_DATASOURCE_USERNAME: vnshop
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-vnshop}
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_SECURITY_PROTOCOL: SASL_PLAINTEXT
      KAFKA_SASL_USERNAME: svc-shipping
      KAFKA_SASL_PASSWORD: ${KAFKA_SVC_SHIPPING_PASSWORD:?KAFKA_SVC_SHIPPING_PASSWORD must be set}
      KEYCLOAK_ISSUER_URI: http://localhost:8085/realms/vnshop
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/vnshop/protocol/openid-connect/certs
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
      OTEL_TRACES_SAMPLER: parentbased_traceidratio
      OTEL_TRACES_SAMPLER_ARG: "1.0"
      # Carrier mode: "stub" (default, deterministic pricing) or "live" (real GHN/GHTK APIs).
      CARRIER_MODE: ${CARRIER_MODE:-stub}
      # GHN (Giao Hàng Nhanh) credentials — https://dev.ghn.vn
      GHN_BASE_URL: ${GHN_BASE_URL:-https://dev-online-gateway.ghn.vn}
      GHN_TOKEN: ${GHN_TOKEN:-}
      GHN_SHOP_ID: ${GHN_SHOP_ID:-}
      GHN_SERVICE_TYPE_ID: ${GHN_SERVICE_TYPE_ID:-2}
      # GHTK (Giao Hàng Tiết Kiệm) credentials — https://giaohangtietkiem.vn
      GHTK_BASE_URL: ${GHTK_BASE_URL:-https://services.giaohangtietkiem.vn}
      GHTK_TOKEN: ${GHTK_TOKEN:-}
      GHTK_PARTNER_CODE: ${GHTK_PARTNER_CODE:-}
    volumes:
      - ./infra/kafka/certs/kafka.truststore.jks:/etc/kafka/secrets/kafka.truststore.jks:ro
    deploy:
      resources:
        limits:
          memory: 768M

  messaging-service:
    profiles: ["apps"]
    build: ./services/messaging-service
    container_name: vnshop-messaging-service
    ports:
      - "8095:8095"
    depends_on:
      postgres-legacy:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DB_HOST: postgres-legacy
      DB_PORT: 5432
      DB_USERNAME: vnshop
      DB_PASSWORD: ${POSTGRES_PASSWORD:-vnshop}
      DB_DATABASE: vnshop
      DATABASE_URL: postgresql://vnshop:${POSTGRES_PASSWORD:-vnshop}@postgres-legacy:5432/vnshop?currentSchema=messaging_svc
      PORT: 8095
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://jaeger:4318/v1/traces
      OTEL_TRACES_SAMPLER: parentbased_traceidratio
      OTEL_TRACES_SAMPLER_ARG: "1.0"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_SASL_USERNAME: svc-order
      KAFKA_SASL_PASSWORD: ${KAFKA_SVC_ORDER_PASSWORD:?KAFKA_SVC_ORDER_PASSWORD must be set}
      KEYCLOAK_ISSUER_URI: http://localhost:8085/realms/vnshop
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/vnshop/protocol/openid-connect/certs

  monitoring-service-v2:
    profiles: ["apps"]
    build: ./services/monitoring-service-v2
    container_name: vnshop-monitoring
    ports:
      - "8096:8096"
    environment:
      PORT: 8096
      GATEWAY_URL: http://api-gateway:8080
      GATEWAY_ACTUATOR_URL: http://api-gateway:8080/actuator/gateway/routes
      TIMESCALE_HOST: timescaledb
      TIMESCALE_PORT: 5432
      TIMESCALE_DB: monitoring
      TIMESCALE_USER: monitoring
      TIMESCALE_PASSWORD: ${MONITORING_DB_PASSWORD:-monitoring}
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/vnshop
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/vnshop/protocol/openid-connect/certs
      CORS_ORIGINS: http://localhost:8096,http://localhost:3000,http://localhost:5173
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8096/monitoring/services || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres-unleash:
    image: postgres:16-alpine
    container_name: vnshop-postgres-unleash
    environment:
      POSTGRES_USER: unleash
      POSTGRES_PASSWORD: ${UNLEASH_DB_PASSWORD:-unleash123}
      POSTGRES_DB: unleash
    volumes:
      - unleash-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unleash"]
      interval: 5s
      timeout: 3s
      retries: 10

  unleash:
    image: unleashorg/unleash-server:6.1
    container_name: vnshop-unleash
    ports:
      - "4242:4242"
    environment:
      DATABASE_URL: postgres://unleash:${UNLEASH_DB_PASSWORD:-unleash123}@postgres-unleash:5432/unleash
      DATABASE_SSL: "false"
      INIT_ADMIN_API_TOKENS: "*:*.unleash-insecure-admin-api-token"
      INIT_CLIENT_API_TOKENS: "default:development.unleash-insecure-client-token"
    depends_on:
      postgres-unleash:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4242/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  postgres-invoice:
    profiles: ["apps"]
    image: postgres:17.9
    container_name: vnshop-postgres-invoice
    environment:
      POSTGRES_DB: vnshop_invoice
      POSTGRES_USER: vnshop
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vnshop}
    ports:
      - "5441:5432"
    volumes:
      - postgres-invoice-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vnshop -d vnshop_invoice"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  invoice-service:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: services/invoice-service/Dockerfile
    container_name: vnshop-invoice-service
    ports:
      - "8098:8098"
    depends_on:
      postgres-invoice:
        condition: service_healthy
      kafka:
        condition: service_healthy
      configuration-service:
        condition: service_healthy
    environment:
      SERVER_PORT: 8098
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-invoice:5432/vnshop_invoice?currentSchema=invoice_svc
      SPRING_DATASOURCE_USERNAME: vnshop
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-vnshop}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_SECURITY_PROTOCOL: SASL_PLAINTEXT
      KAFKA_SASL_USERNAME: svc-invoice
      KAFKA_SASL_PASSWORD: ${KAFKA_SVC_INVOICE_PASSWORD:?KAFKA_SVC_INVOICE_PASSWORD must be set}
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
      OTEL_TRACES_SAMPLER: parentbased_traceidratio
      OTEL_TRACES_SAMPLER_ARG: "1.0"
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  postgres-legacy-data:
  postgres-keycloak-data:
  postgres-user-data:
  postgres-product-data:
  postgres-order-data:
  postgres-payment-data:
  postgres-inventory-data:
  postgres-search-data:
  postgres-shipping-data:
  postgres-cart-data:
  redis-data:
  redis-master-data:
  kafka-data:
  elasticsearch-data:
  minio-data:
  mongo-data:
  timescaledb-data:
  prometheus-data:
  grafana-data:
  loki-data:
  unleash-db-data:
  postgres-invoice-data:
