    build: ./services/cart-service
    container_name: vnshop-cart-service
    ports:
      - "8084:8084"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: 8084
      REDIS_HOST: redis
      KEYCLOAK_ISSUER_URI: http://localhost:8085/realms/vnshop
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/vnshop/protocol/openid-connect/certs
