        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DB_HOST: postgres-legacy
      DB_PORT: 5432
      DB_USERNAME: vnshop
      DB_PASSWORD: vnshop123
      DB_DATABASE: vnshop
      DATABASE_URL: postgresql://vnshop:vnshop123@postgres-legacy:5432/vnshop?currentSchema=notification_svc
      PORT: 8087
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://jaeger:4318/v1/traces
      OTEL_TRACES_SAMPLER: always_on
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  coupon-service:
    profiles: ["apps"]
    build: ./services/coupon-service
    container_name: vnshop-coupon-service
    ports:
