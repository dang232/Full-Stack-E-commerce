      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces

  order-service:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    container_name: vnshop-order-service
