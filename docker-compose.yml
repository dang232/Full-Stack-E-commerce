name: vnshop

services:
  postgres-legacy:
    profiles: ["apps", "legacy"]
    image: postgres:17.9
    container_name: vnshop-postgres-legacy
    environment:
      POSTGRES_DB: vnshop
      POSTGRES_USER: vnshop
      POSTGRES_PASSWORD: vnshop123
    ports:
      - "5432:5432"
    volumes:
      - postgres-legacy-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vnshop -d vnshop"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-keycloak:
    image: postgres:17.9
    container_name: vnshop-postgres-keycloak
    environment:
      POSTGRES_DB: vnshop_keycloak
      POSTGRES_USER: vnshop
      POSTGRES_PASSWORD: vnshop123
    volumes:
      - postgres-keycloak-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vnshop -d vnshop_keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-user:
    profiles: ["apps"]
    image: postgres:17.9
    container_name: vnshop-postgres-user
    environment:
      POSTGRES_DB: vnshop_user
      POSTGRES_USER: vnshop
      POSTGRES_PASSWORD: vnshop123
    ports:
      - "5433:5432"
    volumes:
      - postgres-user-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vnshop -d vnshop_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-product:
    profiles: ["apps"]
    image: postgres:17.9
    container_name: vnshop-postgres-product
    environment:
      POSTGRES_DB: vnshop_product
      POSTGRES_USER: vnshop
      POSTGRES_PASSWORD: vnshop123
    ports:
      - "5434:5432"
    volumes:
      - postgres-product-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vnshop -d vnshop_product"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-order:
    profiles: ["apps"]
    image: postgres:17.9
    container_name: vnshop-postgres-order
    environment:
      POSTGRES_DB: vnshop_order
      POSTGRES_USER: vnshop
      POSTGRES_PASSWORD: vnshop123
    ports:
      - "5435:5432"
    volumes:
      - postgres-order-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vnshop -d vnshop_order"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-payment:
    profiles: ["apps"]
    image: postgres:17.9
    container_name: vnshop-postgres-payment
    environment:
      POSTGRES_DB: vnshop_payment
      POSTGRES_USER: vnshop
      POSTGRES_PASSWORD: vnshop123
    ports:
      - "5436:5432"
    volumes:
      - postgres-payment-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vnshop -d vnshop_payment"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-inventory:
    profiles: ["apps"]
    image: postgres:17.9
    container_name: vnshop-postgres-inventory
    environment:
      POSTGRES_DB: vnshop_inventory
      POSTGRES_USER: vnshop
      POSTGRES_PASSWORD: vnshop123
    ports:
      - "5437:5432"
    volumes:
      - postgres-inventory-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vnshop -d vnshop_inventory"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-search:
    profiles: ["apps"]
    image: postgres:17.9
    container_name: vnshop-postgres-search
    environment:
      POSTGRES_DB: vnshop_search
      POSTGRES_USER: vnshop
      POSTGRES_PASSWORD: vnshop123
    ports:
      - "5438:5432"
    volumes:
      - postgres-search-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vnshop -d vnshop_search"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-shipping:
    profiles: ["apps"]
    image: postgres:17.9
    container_name: vnshop-postgres-shipping
    environment:
      POSTGRES_DB: vnshop_shipping
      POSTGRES_USER: vnshop
      POSTGRES_PASSWORD: vnshop123
    ports:
      - "5439:5432"
    volumes:
      - postgres-shipping-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vnshop -d vnshop_shipping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6-alpine
    container_name: vnshop-redis
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:8.2.0
    container_name: vnshop-kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092
      # Advertise the in-network address for service-to-broker traffic AND a host-mapped
      # address for tools running on the laptop. Without the in-network advertised name,
      # clients bootstrap fine but then get told to reconnect to "localhost:9092" and fail.
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.6
    container_name: vnshop-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/vnshop_keycloak
      KC_DB_SCHEMA: keycloak
      KC_DB_USERNAME: vnshop
      KC_DB_PASSWORD: vnshop123
      # Exposes /health/{started,live,ready} on management port 9000 (per Keycloak 26 docs).
      # The image has no curl/wget, so the healthcheck below uses bash's /dev/tcp.
      KC_HEALTH_ENABLED: "true"
      # Pin the issuer/frontchannel URL so tokens always carry iss=http://localhost:8085/...
      # regardless of which Host header the request came in on. Services validate iss against
      # this same URL but fetch JWKS via in-network http://keycloak:8080 (jwk-set-uri override).
      KC_HOSTNAME: http://localhost:8085
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "false"
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "8085:8080"
    volumes:
      - ./infra/keycloak/vnshop-realm.json:/opt/keycloak/data/import/vnshop-realm.json:ro
    depends_on:
      postgres-keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000; printf 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; head -1 <&3 | grep -q '200'"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.4.0
    container_name: vnshop-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health >/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 10

  jaeger:
    image: jaegertracing/all-in-one:1.71.0
    container_name: vnshop-jaeger
    ports:
      - "16686:16686"
      - "14250:14250"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:16686"]
      interval: 15s
      timeout: 5s
      retries: 10

  alertmanager:
    image: prom/alertmanager:latest
    container_name: vnshop-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./infra/alertmanager/rules.yml:/etc/alertmanager/rules.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9093/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 10

  api-gateway:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: vnshop-api-gateway
    restart: on-failure:5
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started
    environment:
      SERVER_PORT: 8080
      REDIS_HOST: redis
      KEYCLOAK_ISSUER_URI: http://localhost:8085/realms/vnshop
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/vnshop/protocol/openid-connect/certs
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
      GATEWAY_CORS_ALLOWED_ORIGINS: ${GATEWAY_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}

  frontend:
    profiles: ["apps"]
    build:
      context: ./fe
      args:
        # Vite inlines these at build time. Override per environment.
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-http://localhost:8085}
        VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-vnshop}
        VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-vnshop-web}
    container_name: vnshop-frontend
    ports:
      - "3000:80"
    depends_on:
      api-gateway:
        condition: service_started
      keycloak:
        condition: service_started

  user-service:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: vnshop-user-service
    ports:
      - "8081:8081"
    depends_on:
      postgres-user:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-user:5432/vnshop_user?currentSchema=user_svc
      SPRING_DATASOURCE_USERNAME: vnshop
      SPRING_DATASOURCE_PASSWORD: vnshop123
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KEYCLOAK_ISSUER_URI: http://localhost:8085/realms/vnshop
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/vnshop/protocol/openid-connect/certs
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces

  product-service:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: services/product-service/Dockerfile
    container_name: vnshop-product-service
    ports:
      - "8082:8082"
    depends_on:
      postgres-product:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-product:5432/vnshop_product?currentSchema=product_svc
      SPRING_DATASOURCE_USERNAME: vnshop
      SPRING_DATASOURCE_PASSWORD: vnshop123
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KEYCLOAK_ISSUER_URI: http://localhost:8085/realms/vnshop
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/vnshop/protocol/openid-connect/certs
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces

  inventory-service:
