name: vnshop

services:
  postgres-legacy:
    profiles: ["apps", "legacy"]
    image: postgres:17.9
    container_name: vnshop-postgres-legacy
    environment:
      POSTGRES_DB: vnshop
      POSTGRES_USER: vnshop
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vnshop}
    ports:
      - "5432:5432"
    volumes:
      - postgres-legacy-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vnshop -d vnshop"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  postgres-keycloak:
    image: postgres:17.9
    container_name: vnshop-postgres-keycloak
    environment:
      POSTGRES_DB: vnshop_keycloak
      POSTGRES_USER: vnshop
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vnshop}
    volumes:
      - postgres-keycloak-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vnshop -d vnshop_keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  postgres-user:
    profiles: ["apps"]
    image: postgres:17.9
    container_name: vnshop-postgres-user
    environment:
      POSTGRES_DB: vnshop_user
      POSTGRES_USER: vnshop
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vnshop}
    ports:
      - "5433:5432"
    volumes:
      - postgres-user-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vnshop -d vnshop_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  postgres-product:
    profiles: ["apps"]
    image: postgres:17.9
    container_name: vnshop-postgres-product
    environment:
      POSTGRES_DB: vnshop_product
      POSTGRES_USER: vnshop
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vnshop}
    ports:
      - "5434:5432"
    volumes:
      - postgres-product-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vnshop -d vnshop_product"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  postgres-order:
    profiles: ["apps"]
    image: postgres:17.9
    container_name: vnshop-postgres-order
    environment:
      POSTGRES_DB: vnshop_order
      POSTGRES_USER: vnshop
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vnshop}
    ports:
      - "5435:5432"
    volumes:
      - postgres-order-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vnshop -d vnshop_order"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  postgres-payment:
    profiles: ["apps"]
    image: postgres:17.9
    container_name: vnshop-postgres-payment
    environment:
      POSTGRES_DB: vnshop_payment
      POSTGRES_USER: vnshop
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vnshop}
    ports:
      - "5436:5432"
    volumes:
      - postgres-payment-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vnshop -d vnshop_payment"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  postgres-inventory:
    profiles: ["apps"]
    image: postgres:17.9
    container_name: vnshop-postgres-inventory
    environment:
      POSTGRES_DB: vnshop_inventory
      POSTGRES_USER: vnshop
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vnshop}
    ports:
      - "5437:5432"
    volumes:
      - postgres-inventory-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vnshop -d vnshop_inventory"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  postgres-search:
    profiles: ["apps"]
    image: postgres:17.9
    container_name: vnshop-postgres-search
    environment:
      POSTGRES_DB: vnshop_search
      POSTGRES_USER: vnshop
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vnshop}
    ports:
      - "5438:5432"
    volumes:
      - postgres-search-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vnshop -d vnshop_search"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  postgres-shipping:
    profiles: ["apps"]
    image: postgres:17.9
    container_name: vnshop-postgres-shipping
    environment:
      POSTGRES_DB: vnshop_shipping
      POSTGRES_USER: vnshop
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vnshop}
    ports:
      - "5439:5432"
    volumes:
      - postgres-shipping-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vnshop -d vnshop_shipping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  postgres-cart:
    profiles: ["apps"]
    image: postgres:17.9
    container_name: vnshop-postgres-cart
    environment:
      POSTGRES_DB: vnshop_cart
      POSTGRES_USER: vnshop
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vnshop}
    ports:
      - "5442:5432"
    volumes:
      - postgres-cart-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vnshop -d vnshop_cart"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: vnshop-timescaledb
    environment:
      POSTGRES_DB: monitoring
      POSTGRES_USER: monitoring
      POSTGRES_PASSWORD: ${MONITORING_DB_PASSWORD:-monitoring}
    ports:
      - "5440:5432"
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
      - ./infra/timescaledb/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monitoring -d monitoring"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6-alpine
    container_name: vnshop-redis
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "volatile-lru", "--requirepass", "${REDIS_PASSWORD:-vnshop123}"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-vnshop123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  redis-master:
    image: redis:8.6-alpine
    container_name: vnshop-redis-master
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "volatile-lru", "--requirepass", "${REDIS_PASSWORD:-vnshop123}", "--masterauth", "${REDIS_PASSWORD:-vnshop123}"]
    ports:
      - "6380:6379"
    volumes:
      - redis-master-data:/data
    profiles: ["ha"]
    deploy:
      resources:
        limits:
          memory: 256M

  redis-replica-1:
    image: redis:8.6-alpine
    container_name: vnshop-redis-replica-1
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-vnshop123}", "--masterauth", "${REDIS_PASSWORD:-vnshop123}", "--replicaof", "redis-master", "6379"]
    depends_on:
      - redis-master
    profiles: ["ha"]

  redis-replica-2:
    image: redis:8.6-alpine
    container_name: vnshop-redis-replica-2
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-vnshop123}", "--masterauth", "${REDIS_PASSWORD:-vnshop123}", "--replicaof", "redis-master", "6379"]
    depends_on:
      - redis-master
    profiles: ["ha"]

  redis-sentinel-1:
    image: redis:8.6-alpine
    container_name: vnshop-redis-sentinel-1
    entrypoint: ["sh", "/usr/local/bin/sentinel-entrypoint.sh"]
    volumes:
      - ./infra/redis/sentinel.conf:/etc/redis/sentinel.conf.template:ro
      - ./infra/redis/sentinel-entrypoint.sh:/usr/local/bin/sentinel-entrypoint.sh:ro
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-vnshop123}
    depends_on:
      - redis-master
    ports:
      - "26379:26379"
    profiles: ["ha"]

  redis-sentinel-2:
    image: redis:8.6-alpine
    container_name: vnshop-redis-sentinel-2
    entrypoint: ["sh", "/usr/local/bin/sentinel-entrypoint.sh"]
    volumes:
      - ./infra/redis/sentinel.conf:/etc/redis/sentinel.conf.template:ro
      - ./infra/redis/sentinel-entrypoint.sh:/usr/local/bin/sentinel-entrypoint.sh:ro
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-vnshop123}
    depends_on:
      - redis-master
    profiles: ["ha"]

  redis-sentinel-3:
    image: redis:8.6-alpine
    container_name: vnshop-redis-sentinel-3
    entrypoint: ["sh", "/usr/local/bin/sentinel-entrypoint.sh"]
    volumes:
      - ./infra/redis/sentinel.conf:/etc/redis/sentinel.conf.template:ro
      - ./infra/redis/sentinel-entrypoint.sh:/usr/local/bin/sentinel-entrypoint.sh:ro
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-vnshop123}
    depends_on:
      - redis-master
    profiles: ["ha"]

  mongo:
    image: mongo:7.0
    container_name: vnshop-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: vnshop
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-vnshop123}
      MONGO_INITDB_DATABASE: notification_db
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------------------
  # Kafka (local dev — single broker, replication.factor=1)
  #
  # Trade-off: a single broker means no partition replication and no
  # fault tolerance. This is intentional for local development: it keeps
  # resource usage low and avoids the ISR/leader-election delays that
  # slow down test cycles.
  #
  # Production uses a 3-broker StatefulSet with:
  #   default.replication.factor=3, min.insync.replicas=2
  # See infra/k8s/kafka/kafka-statefulset.yaml for the production setup.
  # -----------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:8.2.0
    container_name: vnshop-kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: SASL_PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,SASL_PLAINTEXT_HOST://0.0.0.0:29092
      # Advertise the in-network address for service-to-broker traffic AND a host-mapped
      # address for tools running on the laptop. Without the in-network advertised name,
      # clients bootstrap fine but then get told to reconnect to "localhost:9092" and fail.
      KAFKA_ADVERTISED_LISTENERS: SASL_PLAINTEXT://kafka:9092,SASL_PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: SASL_PLAINTEXT:SASL_PLAINTEXT,SASL_PLAINTEXT_HOST:SASL_PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: SASL_PLAINTEXT
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_OPTS: "-Djava.security.auth.login.config=/etc/kafka/kafka_server_jaas.conf"
      KAFKA_AUTHORIZER_CLASS_NAME: org.apache.kafka.metadata.authorizer.StandardAuthorizer
      KAFKA_SUPER_USERS: "User:admin;User:ANONYMOUS"
      KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND: "true"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_ADMIN_PASSWORD: ${KAFKA_ADMIN_PASSWORD:?KAFKA_ADMIN_PASSWORD must be set}
      KAFKA_ORDER_PASSWORD: ${KAFKA_ORDER_PASSWORD:?KAFKA_ORDER_PASSWORD must be set}
      KAFKA_PAYMENT_PASSWORD: ${KAFKA_PAYMENT_PASSWORD:?KAFKA_PAYMENT_PASSWORD must be set}
      KAFKA_INVENTORY_PASSWORD: ${KAFKA_INVENTORY_PASSWORD:?KAFKA_INVENTORY_PASSWORD must be set}
      KAFKA_PRODUCT_PASSWORD: ${KAFKA_PRODUCT_PASSWORD:?KAFKA_PRODUCT_PASSWORD must be set}
      KAFKA_SHIPPING_PASSWORD: ${KAFKA_SHIPPING_PASSWORD:?KAFKA_SHIPPING_PASSWORD must be set}
      KAFKA_FINANCE_PASSWORD: ${KAFKA_FINANCE_PASSWORD:?KAFKA_FINANCE_PASSWORD must be set}
      KAFKA_SEARCH_PASSWORD: ${KAFKA_SEARCH_PASSWORD:?KAFKA_SEARCH_PASSWORD must be set}
      KAFKA_RECOMMENDATIONS_PASSWORD: ${KAFKA_RECOMMENDATIONS_PASSWORD:?KAFKA_RECOMMENDATIONS_PASSWORD must be set}
      KAFKA_INVOICE_PASSWORD: ${KAFKA_INVOICE_PASSWORD:?KAFKA_INVOICE_PASSWORD must be set}
      KAFKA_SSL_CLIENT_AUTH: none
    entrypoint: ["/bin/sh", "-c", "sed -e \"s/\\$${KAFKA_ADMIN_PASSWORD}/$KAFKA_ADMIN_PASSWORD/g\" -e \"s/\\$${KAFKA_ORDER_PASSWORD}/$KAFKA_ORDER_PASSWORD/g\" -e \"s/\\$${KAFKA_PAYMENT_PASSWORD}/$KAFKA_PAYMENT_PASSWORD/g\" -e \"s/\\$${KAFKA_INVENTORY_PASSWORD}/$KAFKA_INVENTORY_PASSWORD/g\" -e \"s/\\$${KAFKA_PRODUCT_PASSWORD}/$KAFKA_PRODUCT_PASSWORD/g\" -e \"s/\\$${KAFKA_SHIPPING_PASSWORD}/$KAFKA_SHIPPING_PASSWORD/g\" -e \"s/\\$${KAFKA_FINANCE_PASSWORD}/$KAFKA_FINANCE_PASSWORD/g\" -e \"s/\\$${KAFKA_SEARCH_PASSWORD}/$KAFKA_SEARCH_PASSWORD/g\" -e \"s/\\$${KAFKA_RECOMMENDATIONS_PASSWORD}/$KAFKA_RECOMMENDATIONS_PASSWORD/g\" -e \"s/\\$${KAFKA_INVOICE_PASSWORD}/$KAFKA_INVOICE_PASSWORD/g\" /etc/kafka/kafka_server_jaas.conf.template > /etc/kafka/kafka_server_jaas.conf && exec /etc/confluent/docker/run"]
    volumes:
      - kafka-data:/var/lib/kafka/data
      - ./infra/kafka/kafka_server_jaas.conf.template:/etc/kafka/kafka_server_jaas.conf.template:ro
    # TCP probe on the CONTROLLER port (PLAINTEXT, no auth required).
    # Verifies the broker process is up and accepting connections without
    # needing SASL credentials. replication.factor=1 (single broker — see
    # comment above the service definition for the production trade-off).
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9093' 2>/dev/null && echo OK"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1536M

  init-kafka:
    image: confluentinc/cp-kafka:8.2.0
    container_name: vnshop-init-kafka
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_ADMIN_PASSWORD: ${KAFKA_ADMIN_PASSWORD:?KAFKA_ADMIN_PASSWORD must be set}
    volumes:
      - ./infra/scripts/init-kafka-topics.sh:/init-kafka-topics.sh:ro
    command: ["bash", "/init-kafka-topics.sh"]
    restart: "no"

  keycloak:
    image: quay.io/keycloak/keycloak:26.6
    container_name: vnshop-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/vnshop_keycloak
      KC_DB_SCHEMA: keycloak
      KC_DB_USERNAME: vnshop
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-vnshop}
      # Exposes /health/{started,live,ready} on management port 9000 (per Keycloak 26 docs).
      # The image has no curl/wget, so the healthcheck below uses bash's /dev/tcp.
      KC_HEALTH_ENABLED: "true"
      # Pin the issuer/frontchannel URL so tokens always carry iss=http://localhost:8085/...
      # regardless of which Host header the request came in on. Services validate iss against
      # this same URL but fetch JWKS via in-network http://keycloak:8080 (jwk-set-uri override).
      KC_HOSTNAME: http://localhost:8085
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "false"
      KC_HOSTNAME_STRICT: "false"
      KEYCLOAK_GATEWAY_CLIENT_SECRET: ${KEYCLOAK_GATEWAY_CLIENT_SECRET:-vnshop-gateway-secret-dev}
      KEYCLOAK_ADMIN_API_CLIENT_SECRET: ${KEYCLOAK_ADMIN_API_CLIENT_SECRET:-vnshop-admin-api-secret-dev}
    ports:
      - "8085:8080"
    volumes:
      - ./infra/keycloak/vnshop-realm.json:/opt/keycloak/data/import/vnshop-realm.json:ro
    depends_on:
      postgres-keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000; printf 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; head -1 <&3 | grep -q '200'"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 768M

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.4.0
    container_name: vnshop-elasticsearch
    profiles: ["apps"]
    environment:
      discovery.type: single-node
      xpack.security.enabled: "true"
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD:?ELASTIC_PASSWORD must be set}
      xpack.security.http.ssl.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health >/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1G

  # Local-dev object storage. Production swaps to Cloudflare R2 by setting
  # vnshop.object-storage.{profile,endpoint,access-key,secret-key,bucket} —
  # the AWS S3 SDK code in S3ObjectStorageAdapter / S3InvoiceStorageAdapter is
  # wire-compatible with both. R2 is the production target (zero egress fees).
  minio:
    profiles: ["apps"]
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: vnshop-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-vnshop}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-vnshop123}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 10

  minio-bootstrap:
    profiles: ["apps"]
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: vnshop-minio-bootstrap
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-vnshop} ${MINIO_ROOT_PASSWORD:-vnshop123} &&
        mc mb --ignore-existing local/vnshop-products local/vnshop-reviews local/vnshop-invoices local/vnshop-avatars &&
        mc anonymous set download local/vnshop-products &&
        mc anonymous set download local/vnshop-reviews &&
        mc anonymous set download local/vnshop-avatars &&
        echo "minio buckets ready"

  jaeger:
    image: jaegertracing/all-in-one:1.71.0
    container_name: vnshop-jaeger
    ports:
      - "16686:16686"
      - "14250:14250"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:16686"]
      interval: 15s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: vnshop-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/rules.yml:/etc/prometheus/rules.yml:ro
      - ./infra/prometheus/slo-rules.yml:/etc/prometheus/slo-rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 10

  grafana:
    image: grafana/grafana:11.1.0
    container_name: vnshop-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-vnshop123}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3001
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  loki:
    image: grafana/loki:3.1.0
    container_name: vnshop-loki
    ports:
      - "3100:3100"
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 10

  promtail:
    image: grafana/promtail:3.1.0
    container_name: vnshop-promtail
    volumes:
      - ./infra/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy

  alertmanager:
    image: prom/alertmanager:latest
    container_name: vnshop-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./infra/alertmanager/rules.yml:/etc/alertmanager/rules.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9093/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 10

  api-gateway:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: vnshop-api-gateway
    restart: on-failure:5
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started
    environment:
      SERVER_PORT: 8080
      REDIS_HOST: redis
      KEYCLOAK_ISSUER_URI: http://localhost:8085/realms/vnshop
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/vnshop/protocol/openid-connect/certs
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
      OTEL_TRACES_SAMPLER: parentbased_traceidratio
      OTEL_TRACES_SAMPLER_ARG: "1.0"
      GATEWAY_CORS_ALLOWED_ORIGINS: ${GATEWAY_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
    deploy:
      resources:
        limits:
          memory: 768M

  frontend:
    profiles: ["apps"]
    build:
      context: ./fe
      args:
        # Vite inlines these at build time. Override per environment.
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-http://localhost:8085}
        VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-vnshop}
        # vnshop-api is the public client with directAccessGrantsEnabled=true.
        # The FE uses ROPC (native form -> Keycloak token endpoint) instead of
        # the PKCE redirect flow, so vnshop-web (PKCE-only) won't work for
        # passwordLogin / refreshTokens.
        VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-vnshop-api}
        # Payment provider toggles + publishable creds. Vite inlines at build,
        # so adding/removing requires `up -d --build frontend`. Defaults are
        # `false`/empty so the success step renders the disabled-placeholder
        # rather than the live Stripe/PayPal section when creds aren't set.
        VITE_STRIPE_ENABLED: ${VITE_STRIPE_ENABLED:-false}
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY:-}
        VITE_PAYPAL_ENABLED: ${VITE_PAYPAL_ENABLED:-false}
        VITE_PAYPAL_CLIENT_ID: ${VITE_PAYPAL_CLIENT_ID:-}
    container_name: vnshop-frontend
    ports:
      - "3000:80"
    depends_on:
      api-gateway:
        condition: service_started
      keycloak:
        condition: service_started

  user-service:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: vnshop-user-service
    ports:
      - "8081:8081"
    depends_on:
      postgres-user:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-user:5432/vnshop_user?currentSchema=user_svc
      SPRING_DATASOURCE_USERNAME: vnshop
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-vnshop}
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KEYCLOAK_ISSUER_URI: http://localhost:8085/realms/vnshop
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/vnshop/protocol/openid-connect/certs
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
      OTEL_TRACES_SAMPLER: parentbased_traceidratio
      OTEL_TRACES_SAMPLER_ARG: "1.0"
      # Avatar object storage. Reads from .env — defaults to MinIO for local dev.
      # Flip PROFILE=R2 + R2 endpoint/keys in .env when R2 creds are available.
      VNSHOP_USER_STORAGE_ENABLED: ${VNSHOP_USER_STORAGE_ENABLED:-true}
      VNSHOP_USER_STORAGE_PROFILE: ${VNSHOP_USER_STORAGE_PROFILE:-MINIO}
      VNSHOP_USER_STORAGE_ENDPOINT: ${VNSHOP_USER_STORAGE_ENDPOINT:-http://minio:9000}
      VNSHOP_USER_STORAGE_PUBLIC_ENDPOINT: ${VNSHOP_USER_STORAGE_PUBLIC_ENDPOINT:-http://localhost:9000}
      VNSHOP_USER_STORAGE_BUCKET: ${VNSHOP_USER_STORAGE_BUCKET:-vnshop-avatars}
      VNSHOP_USER_STORAGE_REGION: ${VNSHOP_USER_STORAGE_REGION:-auto}
      VNSHOP_USER_STORAGE_ACCESS_KEY: ${VNSHOP_USER_STORAGE_ACCESS_KEY:-${MINIO_ROOT_USER:-vnshop}}
      VNSHOP_USER_STORAGE_SECRET_KEY: ${VNSHOP_USER_STORAGE_SECRET_KEY:-${MINIO_ROOT_PASSWORD:-vnshop123}}
      VNSHOP_USER_STORAGE_PATH_STYLE_ACCESS: ${VNSHOP_USER_STORAGE_PATH_STYLE_ACCESS:-true}
    deploy:
      resources:
        limits:
          memory: 768M

  product-service:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: services/product-service/Dockerfile
    container_name: vnshop-product-service
    ports:
      - "8082:8082"
    depends_on:
      postgres-product:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      configuration-service:
        condition: service_healthy
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-product:5432/vnshop_product?currentSchema=product_svc
      SPRING_DATASOURCE_USERNAME: vnshop
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-vnshop}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_SECURITY_PROTOCOL: SASL_PLAINTEXT
      KAFKA_SASL_USERNAME: svc-product
      KAFKA_SASL_PASSWORD: ${KAFKA_SVC_PRODUCT_PASSWORD:?KAFKA_SVC_PRODUCT_PASSWORD must be set}
      KEYCLOAK_ISSUER_URI: http://localhost:8085/realms/vnshop
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/vnshop/protocol/openid-connect/certs
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
      OTEL_TRACES_SAMPLER: parentbased_traceidratio
      OTEL_TRACES_SAMPLER_ARG: "1.0"
      # Object storage — defaults route to local MinIO. Override OBJECT_STORAGE_*
      # in .env to point at Cloudflare R2 (or any S3-compatible backend) for prod.
      VNSHOP_OBJECT_STORAGE_ENABLED: ${OBJECT_STORAGE_ENABLED:-true}
      VNSHOP_OBJECT_STORAGE_PROFILE: ${OBJECT_STORAGE_PROFILE:-MINIO}
      VNSHOP_OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET_PRODUCTS:-vnshop-products}
      VNSHOP_OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT:-http://minio:9000}
      VNSHOP_OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-auto}
      VNSHOP_OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY:-vnshop}
      VNSHOP_OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY:-vnshop123}
      VNSHOP_OBJECT_STORAGE_PATH_STYLE_ACCESS: ${OBJECT_STORAGE_PATH_STYLE:-true}
    volumes:
      - ./infra/kafka/certs/kafka.truststore.jks:/etc/kafka/secrets/kafka.truststore.jks:ro
    deploy:
      resources:
        limits:
          memory: 768M

  inventory-service:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: services/inventory-service/Dockerfile
    container_name: vnshop-inventory-service
