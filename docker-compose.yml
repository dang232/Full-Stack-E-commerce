      KAFKA_SECURITY_PROTOCOL: SASL_PLAINTEXT
      KAFKA_SASL_USERNAME: svc-inventory
      KAFKA_SASL_PASSWORD: ${KAFKA_SVC_INVENTORY_PASSWORD:?KAFKA_SVC_INVENTORY_PASSWORD must be set}
      KEYCLOAK_ISSUER_URI: http://localhost:8085/realms/vnshop
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/vnshop/protocol/openid-connect/certs
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
      OTEL_TRACES_SAMPLER: parentbased_traceidratio
      OTEL_TRACES_SAMPLER_ARG: "1.0"
    volumes:
      - ./infra/kafka/certs/kafka.truststore.jks:/etc/kafka/secrets/kafka.truststore.jks:ro
