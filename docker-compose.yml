      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-legacy:5432/vnshop?currentSchema=seller_finance_svc
      SPRING_DATASOURCE_USERNAME: vnshop
      SPRING_DATASOURCE_PASSWORD: vnshop123
