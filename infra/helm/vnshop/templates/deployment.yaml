apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-{{ .Values.serviceName }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}-{{ .Values.serviceName }}
    app.kubernetes.io/part-of: vnshop
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Release.Name }}-{{ .Values.serviceName }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Release.Name }}-{{ .Values.serviceName }}
        app.kubernetes.io/part-of: vnshop
    spec:
      serviceAccountName: vnshop-workload
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: {{ .Values.serviceName }}
        image: vnshop/{{ .Values.serviceName }}-service:latest
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.servicePort }}
        readinessProbe:
          httpGet:
            path: {{ .Values.healthPath | default "/actuator/health/readiness" }}
            port: http
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: {{ .Values.healthPath | default "/actuator/health/liveness" }}
            port: http
          periodSeconds: 20
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
