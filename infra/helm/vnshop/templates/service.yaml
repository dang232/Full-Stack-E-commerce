apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-{{ .Values.serviceName }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}-{{ .Values.serviceName }}
    app.kubernetes.io/part-of: vnshop
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: {{ .Release.Name }}-{{ .Values.serviceName }}
  ports:
  - name: http
    port: {{ .Values.servicePort }}
    targetPort: http
