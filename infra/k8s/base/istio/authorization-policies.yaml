# AuthorizationPolicies — deny-all baseline then explicit allow rules
#
# Call graph covered:
#   api-gateway   -> all services          (HTTP, port 8081-8093)
#   order-service -> inventory-service     (gRPC, port 9093)
#   order-service -> payment-service       (gRPC, port 9094)
#   order-service -> shipping-service      (gRPC, port 9095)
#
# Kafka callbacks (payment-service -> order-service) are async via broker
# and do NOT traverse the mesh directly; no AuthorizationPolicy needed.
#
# NOTE: Service accounts below assume per-service accounts are created.
# Currently the repo uses a shared "vnshop-workload" SA.
# Create dedicated SAs (vnshop-api-gateway, vnshop-order-service) before
# tightening these policies in production.

# 1. Deny all inbound traffic by default (no source, no operation = deny)
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: deny-all
  namespace: vnshop
spec: {}

# 2. api-gateway is allowed to reach every other service
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-api-gateway-to-user-service
  namespace: vnshop
spec:
  selector:
    matchLabels:
      app: user-service
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/vnshop/sa/vnshop-api-gateway
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
