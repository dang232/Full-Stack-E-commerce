# DestinationRules — enforce ISTIO_MUTUAL TLS for every vnshop service
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: api-gateway
  namespace: vnshop
spec:
  host: api-gateway.vnshop.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
---
