# VirtualServices — retry and timeout policies matching Resilience4j defaults
#
# Timeout : 5 s total
# Retries : 3 attempts, 2 s per-try timeout
# retryOn : 5xx, reset (connection reset), connect-failure
#
# gRPC services (inventory, payment, shipping) use the same policy;
# Istio applies HTTP/2 framing automatically for gRPC.
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: user-service
  namespace: vnshop
spec:
  hosts:
    - user-service.vnshop.svc.cluster.local
  http:
    - timeout: 5s
      retries:
        attempts: 3
        perTryTimeout: 2s
        retryOn: 5xx,reset,connect-failure
      route:
        - destination:
            host: user-service.vnshop.svc.cluster.local
