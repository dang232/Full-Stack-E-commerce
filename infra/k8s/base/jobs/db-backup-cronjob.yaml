apiVersion: batch/v1
kind: CronJob
metadata:
  name: db-backup
  namespace: vnshop
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: db-backup
          containers:
            - name: backup
              image: postgres:16-alpine
              command: ["bash", "/scripts/backup.sh"]
              env:
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: db-credentials
                      key: password
                - name: S3_BACKUP_BUCKET
                  value: vnshop-backups
                - name: AWS_REGION
                  value: ap-southeast-1
              envFrom:
                - secretRef:
                    name: aws-backup-credentials
              volumeMounts:
                - name: backup-script
                  mountPath: /scripts
                  readOnly: true
          volumes:
            - name: backup-script
              configMap:
                name: db-backup-script
                defaultMode: 0755
