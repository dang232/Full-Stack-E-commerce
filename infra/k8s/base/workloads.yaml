---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vnshop-api-gateway
  labels:
    app.kubernetes.io/name: vnshop-api-gateway
    app.kubernetes.io/part-of: vnshop
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: vnshop-api-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vnshop-api-gateway
        app.kubernetes.io/part-of: vnshop
    spec:
      serviceAccountName: vnshop-workload
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: api-gateway
        image: vnshop/api-gateway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
        env:
        - name: SERVER_PORT
          value: "8080"
        envFrom:
        - configMapRef:
            name: vnshop-app-config
        - secretRef:
            name: vnshop-app-secret
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: http
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: http
          periodSeconds: 20
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /actuator/health
            port: http
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 30
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 768Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: vnshop-api-gateway
  labels:
    app.kubernetes.io/name: vnshop-api-gateway
    app.kubernetes.io/part-of: vnshop
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: vnshop-api-gateway
  ports:
  - name: http
    port: 8080
    targetPort: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vnshop-api-gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vnshop-api-gateway
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: vnshop-api-gateway
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vnshop-api-gateway
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vnshop-api-gateway
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: vnshop-api-gateway
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 8080
  egress:
  - to:
    - podSelector: {}
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 5432
    - protocol: TCP
      port: 6379
    - protocol: TCP
      port: 9092
    - protocol: TCP
      port: 8085
    - protocol: TCP
      port: 4318
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53

