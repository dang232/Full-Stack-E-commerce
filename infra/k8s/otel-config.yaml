# OpenTelemetry Trace Sampling Configuration
#
# OTEL_TRACES_SAMPLER_ARG is overridden per environment in each overlay's
# configmap-env.yaml:
#   dev:     1.0  (100%)
#   staging: 0.1  (10%)
#   prod:    0.01 (1%)
#
# Error traces are always sampled via the tail-based sampling processor
# configured in the OTEL collector (see otel-collector.yaml if present, or
# the Jaeger all-in-one sampling strategies below).
#
# Sampler type is set in the base configmap:
#   OTEL_TRACES_SAMPLER=parentbased_traceidratio
# which means root spans are sampled at the configured ratio and child spans
# respect the parent's sampling decision.
---
# Dev namespace ConfigMap — 100% sampling
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-sampling-config
  namespace: vnshop-dev
  labels:
    app.kubernetes.io/part-of: vnshop
    app.kubernetes.io/component: observability
data:
  OTEL_TRACES_SAMPLER: parentbased_traceidratio
  OTEL_TRACES_SAMPLER_ARG: "1.0"
---
# Staging namespace ConfigMap — 10% sampling
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-sampling-config
  namespace: vnshop-staging
  labels:
    app.kubernetes.io/part-of: vnshop
    app.kubernetes.io/component: observability
data:
  OTEL_TRACES_SAMPLER: parentbased_traceidratio
  OTEL_TRACES_SAMPLER_ARG: "0.1"
---
# Prod namespace ConfigMap — 1% sampling with error always-on via collector
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-sampling-config
  namespace: vnshop-prod
  labels:
    app.kubernetes.io/part-of: vnshop
    app.kubernetes.io/component: observability
data:
  OTEL_TRACES_SAMPLER: parentbased_traceidratio
  OTEL_TRACES_SAMPLER_ARG: "0.01"
---
# OTEL Collector ConfigMap with tail-based sampling processor.
# Error spans (status_code = STATUS_CODE_ERROR) are always sampled regardless
# of the head-based ratio configured above.
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: vnshop-prod
  labels:
    app.kubernetes.io/part-of: vnshop
    app.kubernetes.io/component: observability
data:
  otel-collector.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      # Tail-based sampler: always keep error traces; sample the rest at 1%.
      tail_sampling:
        decision_wait: 10s
        num_traces: 100000
        expected_new_traces_per_sec: 1000
        policies:
          - name: errors-always-on
            type: status_code
            status_code:
              status_codes: [ERROR]
          - name: base-ratio
            type: probabilistic
            probabilistic:
              sampling_percentage: 1

      batch:
        send_batch_size: 1024
        timeout: 5s

      memory_limiter:
        check_interval: 1s
        limit_mib: 512

    exporters:
      otlp/jaeger:
        endpoint: jaeger-collector:4317
        tls:
          insecure: true

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, tail_sampling, batch]
          exporters: [otlp/jaeger]
