apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: vnshop-dev
resources:
- ../../base
- namespace.yaml
replicas:
- name: vnshop-api-gateway
  count: 1
- name: vnshop-user
  count: 1
- name: vnshop-product
  count: 1
- name: vnshop-inventory
  count: 1
- name: vnshop-search
  count: 1
- name: vnshop-cart
  count: 1
- name: vnshop-order
  count: 1
- name: vnshop-payment
  count: 1
- name: vnshop-shipping
  count: 1
- name: vnshop-notification
  count: 1
- name: vnshop-coupon
  count: 1
- name: vnshop-review
  count: 1
- name: vnshop-seller-finance
  count: 1
images:
- name: vnshop/api-gateway
  newTag: dev
- name: vnshop/user-service
  newTag: dev
- name: vnshop/product-service
  newTag: dev
- name: vnshop/inventory-service
  newTag: dev
- name: vnshop/search-service
  newTag: dev
- name: vnshop/cart-service
  newTag: dev
- name: vnshop/order-service
  newTag: dev
- name: vnshop/payment-service
  newTag: dev
- name: vnshop/shipping-service
  newTag: dev
- name: vnshop/notification-service
  newTag: dev
- name: vnshop/coupon-service
  newTag: dev
- name: vnshop/review-service
  newTag: dev
- name: vnshop/seller-finance-service
  newTag: dev
patchesStrategicMerge:
- configmap-env.yaml
patches:
- target:
    kind: HorizontalPodAutoscaler
    name: vnshop-api-gateway
  patch: |-
    - op: replace
      path: /spec/maxReplicas
      value: 3
- target:
    kind: HorizontalPodAutoscaler
    name: vnshop-user
  patch: |-
    - op: replace
      path: /spec/maxReplicas
      value: 3
- target:
    kind: HorizontalPodAutoscaler
    name: vnshop-product
  patch: |-
    - op: replace
      path: /spec/maxReplicas
      value: 3
- target:
    kind: HorizontalPodAutoscaler
    name: vnshop-inventory
  patch: |-
    - op: replace
      path: /spec/maxReplicas
      value: 3
- target:
    kind: HorizontalPodAutoscaler
    name: vnshop-search
  patch: |-
    - op: replace
      path: /spec/maxReplicas
      value: 3
- target:
    kind: HorizontalPodAutoscaler
    name: vnshop-cart
  patch: |-
    - op: replace
      path: /spec/maxReplicas
      value: 3
- target:
    kind: HorizontalPodAutoscaler
    name: vnshop-order
  patch: |-
    - op: replace
      path: /spec/maxReplicas
      value: 3
- target:
    kind: HorizontalPodAutoscaler
    name: vnshop-payment
  patch: |-
    - op: replace
      path: /spec/maxReplicas
      value: 3
- target:
    kind: HorizontalPodAutoscaler
    name: vnshop-shipping
  patch: |-
    - op: replace
      path: /spec/maxReplicas
      value: 3
- target:
    kind: HorizontalPodAutoscaler
    name: vnshop-notification
  patch: |-
    - op: replace
      path: /spec/maxReplicas
      value: 3
- target:
    kind: HorizontalPodAutoscaler
    name: vnshop-coupon
  patch: |-
    - op: replace
      path: /spec/maxReplicas
      value: 3
- target:
    kind: HorizontalPodAutoscaler
    name: vnshop-review
  patch: |-
    - op: replace
      path: /spec/maxReplicas
      value: 3
- target:
    kind: HorizontalPodAutoscaler
    name: vnshop-seller-finance
  patch: |-
    - op: replace
      path: /spec/maxReplicas
      value: 3
