# =============================================================================
# VNShop Kafka — Production broker configuration
#
# This file is mounted into the Kafka StatefulSet pods via a ConfigMap.
# See infra/k8s/kafka/kafka-statefulset.yaml for the full deployment spec.
#
# Local dev uses a single-broker Docker Compose service with
# replication.factor=1. Do NOT apply these settings locally — they require
# at least 3 brokers to satisfy min.insync.replicas=2.
# =============================================================================

########################
# Replication settings
########################

# Each new topic gets 3 replicas by default (one per broker).
# Ensures data survives the loss of any single broker.
default.replication.factor=3

# A producer with acks=all must receive acknowledgement from at least 2
# in-sync replicas before a write is considered successful. Combined with
# default.replication.factor=3 this tolerates one broker failure without
# data loss.
min.insync.replicas=2

# Disables electing an out-of-sync replica as leader. An out-of-sync
# replica may have missed recent writes, so allowing it to lead would
# cause data loss. Prefer availability loss (leader unavailable) over
# data loss.
unclean.leader.election.enable=false

########################
# Topic defaults
########################

# Default partition count for auto-created topics. 6 partitions allow
# up to 6 consumers in a group to process in parallel without rebalancing.
# Tune per-topic with kafka-topics.sh --alter if a topic needs more.
num.partitions=6

# Internal topics for consumer group offsets — keep in sync with
# KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR and
# KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR env vars on each broker.
offsets.topic.replication.factor=3
transaction.state.log.replication.factor=3
transaction.state.log.min.isr=2

########################
# Log retention
########################

# Retain messages for 7 days (168 hours). Adjust per topic with
# kafka-configs.sh --alter --entity-type topics --entity-name <topic>
# --add-config retention.ms=<ms> for different SLAs.
log.retention.hours=168

# Segment roll interval — 1 hour. Smaller segments allow more granular
# retention cleanup and faster broker restarts.
log.segment.bytes=1073741824
log.retention.check.interval.ms=300000

########################
# Performance
########################

# Number of threads for network requests and I/O.
num.network.threads=3
num.io.threads=8
num.recovery.threads.per.data.dir=1

# Socket buffer sizes.
socket.send.buffer.bytes=102400
socket.receive.buffer.bytes=102400
socket.request.max.bytes=104857600
