groups:
  - name: vnshop-observability
    rules:
      - alert: VNShopServiceDown
        expr: up{job=~"vnshop.*"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "VNShop service is down"
          description: "{{ $labels.job }} health endpoint has failed for more than 2 minutes."

      - alert: VNShopHighErrorRate
        expr: sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) / sum(rate(http_server_requests_seconds_count[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "VNShop high HTTP 5xx error rate"
          description: "HTTP 5xx responses are above 5% for 5 minutes."

      - alert: VNShopKafkaConsumerLag
        expr: kafka_consumer_fetch_manager_records_lag_max > 1000
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "VNShop Kafka consumer lag is high"
          description: "Consumer lag is above 1000 records for 5 minutes."

      - alert: VNShopDbConnectionPool
        expr: hikaricp_connections_active / hikaricp_connections_max > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "VNShop database connection pool usage is high"
          description: "Database connection pool usage is above 80% for 5 minutes."

      - alert: VNShopPaymentFailureRate
        expr: sum(rate(vnshop_payment_failures_total[10m])) / sum(rate(vnshop_payment_attempts_total[10m])) > 0.02
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "VNShop payment failure rate is high"
          description: "Payment failures are above 2% for 10 minutes."
