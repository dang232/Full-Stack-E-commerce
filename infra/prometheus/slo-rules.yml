groups:
  - name: vnshop-slo-recording-rules
    interval: 30s
    rules:
      # Error ratio per service (30d rolling)
      - record: slo:http_requests:error_ratio_30d
        expr: |
          sum(rate(http_server_requests_seconds_count{status=~"5.."}[30d])) by (job)
          /
          sum(rate(http_server_requests_seconds_count[30d])) by (job)

      # Error ratio per service (1h window for fast burn)
      - record: slo:http_requests:error_ratio_1h
        expr: |
          sum(rate(http_server_requests_seconds_count{status=~"5.."}[1h])) by (job)
          /
          sum(rate(http_server_requests_seconds_count[1h])) by (job)

      # Error ratio per service (3d window for slow burn)
      - record: slo:http_requests:error_ratio_3d
        expr: |
          sum(rate(http_server_requests_seconds_count{status=~"5.."}[3d])) by (job)
          /
          sum(rate(http_server_requests_seconds_count[3d])) by (job)

      # Latency p99 per service (reads - GET)
      - record: slo:http_requests:latency_p99_reads
        expr: |
          histogram_quantile(0.99,
            sum(rate(http_server_requests_seconds_bucket{method="GET"}[5m])) by (job, le)
          )

      # Latency p99 per service (writes - POST/PUT/DELETE)
      - record: slo:http_requests:latency_p99_writes
        expr: |
          histogram_quantile(0.99,
            sum(rate(http_server_requests_seconds_bucket{method=~"POST|PUT|DELETE"}[5m])) by (job, le)
          )

      # Availability (1 - error_ratio) per service
      - record: slo:http_requests:availability_30d
        expr: 1 - slo:http_requests:error_ratio_30d

  - name: vnshop-slo-alerts
    rules:
      # Fast burn-rate alert (14.4x burn rate over 1h)
      - alert: VNShopSLOFastBurn
        expr: slo:http_requests:error_ratio_1h > (14.4 * 0.005)
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.job }} is burning error budget 14.4x faster than allowed"
          description: "1h error ratio {{ $value | humanizePercentage }} exceeds fast-burn threshold (7.2%). At this rate, 30d budget exhausts in ~2 days."

      # Slow burn-rate alert (3x burn rate over 3d)
      - alert: VNShopSLOSlowBurn
        expr: slo:http_requests:error_ratio_3d > (3 * 0.005)
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.job }} is burning error budget 3x faster than allowed"
          description: "3d error ratio {{ $value | humanizePercentage }} exceeds slow-burn threshold (1.5%). At this rate, 30d budget exhausts in ~10 days."

      # Latency SLO breach (reads)
      - alert: VNShopLatencyReadsBreach
        expr: slo:http_requests:latency_p99_reads > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.job }} read latency p99 {{ $value | humanizeDuration }} exceeds 500ms SLO"

      # Latency SLO breach (writes)
      - alert: VNShopLatencyWritesBreach
        expr: slo:http_requests:latency_p99_writes > 2.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.job }} write latency p99 {{ $value | humanizeDuration }} exceeds 2s SLO"
