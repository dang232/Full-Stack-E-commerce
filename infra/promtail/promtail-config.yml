server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_name']
        regex: '/vnshop-(.*)'
        target_label: 'service_name'
    pipeline_stages:
      - docker: {}
      - json:
          expressions:
            level: level
            logger: logger_name
            message: message
            traceId: traceId
            spanId: spanId
            timestamp: '@timestamp'
      - labels:
          level:
          logger:
          traceId:
      - timestamp:
          source: timestamp
          format: '2006-01-02T15:04:05.000Z07:00'
          fallback_formats:
            - '2006-01-02T15:04:05.000Z'
