# HashiCorp Vault — VNShop production secrets configuration
#
# Prerequisites:
#   vault server -config=vault.hcl   (or Vault Enterprise / HCP Vault)
#   vault operator init && vault operator unseal
#   export VAULT_ADDR=https://vault.internal:8200
#   export VAULT_TOKEN=<root-or-admin-token>
#
# Apply with:
#   vault secrets enable -path=vnshop kv-v2
#   # Then seed each path below with:
#   #   vault kv put vnshop/<path> <key>=<value> ...
#
# This file is NOT applied automatically — it is a human-readable spec that
# documents every secret path and the policy templates that guard them.

# ---------------------------------------------------------------------------
# Secrets engine
# ---------------------------------------------------------------------------
secrets_engine:
  path: vnshop
  type: kv-v2
  description: "VNShop application secrets (KV v2)"

# ---------------------------------------------------------------------------
# Secret paths and their keys
# ---------------------------------------------------------------------------
#
# Convention: vnshop/<service-or-component>/<category>
# Each entry lists all keys that must be populated before the service starts.
#
secrets:
  # --- Kafka SASL/PLAIN broker JAAS identities ---
  - path: vnshop/kafka/broker
    description: "Kafka broker JAAS user passwords (rendered into kafka_server_jaas.conf)"
    keys:
      - KAFKA_ADMIN_PASSWORD       # admin super-user
      - KAFKA_ORDER_PASSWORD       # order-service principal
      - KAFKA_PAYMENT_PASSWORD     # payment-service principal
      - KAFKA_INVENTORY_PASSWORD   # inventory-service principal
      - KAFKA_PRODUCT_PASSWORD     # product-service principal
      - KAFKA_SHIPPING_PASSWORD    # shipping-service principal
      - KAFKA_FINANCE_PASSWORD     # finance-service principal
      - KAFKA_SEARCH_PASSWORD      # search-service principal
      - KAFKA_RECOMMENDATIONS_PASSWORD  # recommendations-service principal

  # --- Kafka SASL/PLAIN service client credentials ---
  - path: vnshop/kafka/clients
    description: "Per-service Kafka SASL/PLAIN client passwords"
    keys:
      - KAFKA_SVC_ORDER_PASSWORD
      - KAFKA_SVC_PAYMENT_PASSWORD
      - KAFKA_SVC_INVENTORY_PASSWORD
      - KAFKA_SVC_PRODUCT_PASSWORD
      - KAFKA_SVC_SHIPPING_PASSWORD
      - KAFKA_SVC_FINANCE_PASSWORD
      - KAFKA_SVC_SEARCH_PASSWORD
      - KAFKA_SVC_RECOMMENDATIONS_PASSWORD

  # --- Elasticsearch ---
  - path: vnshop/elasticsearch
    description: "Elasticsearch built-in superuser password (xpack.security)"
    keys:
      - ELASTIC_PASSWORD

  # --- PostgreSQL ---
  - path: vnshop/postgres
    description: "Shared Postgres password used by all per-service databases"
    keys:
      - POSTGRES_PASSWORD
      - MONITORING_DB_PASSWORD     # TimescaleDB monitoring instance
      - UNLEASH_DB_PASSWORD        # Unleash feature flags database

  # --- MongoDB ---
  - path: vnshop/mongodb
    description: "MongoDB root credentials"
    keys:
      - MONGO_ROOT_PASSWORD

  # --- Redis ---
  - path: vnshop/redis
    description: "Redis AUTH password"
    keys:
      - REDIS_PASSWORD

  # --- Keycloak ---
  - path: vnshop/keycloak
    description: "Keycloak admin credentials and OAuth2 client secrets"
    keys:
      - KEYCLOAK_ADMIN_PASSWORD
      - KEYCLOAK_GATEWAY_CLIENT_SECRET      # api-gateway confidential client
      - KEYCLOAK_ADMIN_API_CLIENT_SECRET    # admin-api Keycloak client

  # --- API Gateway ---
  - path: vnshop/api-gateway
    description: "API Gateway runtime secrets"
    keys:
      - GATEWAY_OAUTH2_CLIENT_SECRET  # mirrors KEYCLOAK_GATEWAY_CLIENT_SECRET

  # --- Application secrets ---
  - path: vnshop/app
    description: "Cross-service application secrets"
    keys:
      - JWT_SIGNING_KEY             # HS256/HS512 key, ≥32 bytes
      - PAYMENT_GATEWAY_API_KEY     # e.g. Stripe/VNPay secret key
      - CARRIER_API_KEY             # shipping carrier API key
      - DATASOURCE_PASSWORD         # used by services that reference this alias

# ---------------------------------------------------------------------------
# Policy templates
# ---------------------------------------------------------------------------
#
# Each service gets a narrow policy granting read-only access to exactly the
# paths it needs. Rotate tokens per deployment.
#
policies:
  - name: vnshop-kafka-broker
    description: "Kafka broker: read broker JAAS passwords"
    rules:
      - path: "vnshop/data/kafka/broker"
        capabilities: [read]

  - name: vnshop-order-service
    description: "Order service: Kafka client + Postgres + app secrets"
    rules:
      - path: "vnshop/data/kafka/clients"
        capabilities: [read]
      - path: "vnshop/data/postgres"
        capabilities: [read]
      - path: "vnshop/data/app"
        capabilities: [read]

  - name: vnshop-payment-service
    description: "Payment service: Kafka client + Postgres + payment key"
    rules:
      - path: "vnshop/data/kafka/clients"
        capabilities: [read]
      - path: "vnshop/data/postgres"
        capabilities: [read]
      - path: "vnshop/data/app"
        capabilities: [read]

  - name: vnshop-inventory-service
    description: "Inventory service: Kafka client + Postgres"
    rules:
      - path: "vnshop/data/kafka/clients"
        capabilities: [read]
      - path: "vnshop/data/postgres"
        capabilities: [read]

  - name: vnshop-product-service
    description: "Product service: Kafka client + Postgres"
    rules:
      - path: "vnshop/data/kafka/clients"
        capabilities: [read]
      - path: "vnshop/data/postgres"
        capabilities: [read]

  - name: vnshop-shipping-service
    description: "Shipping service: Kafka client + Postgres + carrier key"
    rules:
      - path: "vnshop/data/kafka/clients"
        capabilities: [read]
      - path: "vnshop/data/postgres"
        capabilities: [read]
      - path: "vnshop/data/app"
        capabilities: [read]

  - name: vnshop-finance-service
    description: "Finance service: Kafka client + Postgres"
    rules:
      - path: "vnshop/data/kafka/clients"
        capabilities: [read]
      - path: "vnshop/data/postgres"
        capabilities: [read]

  - name: vnshop-search-service
    description: "Search service: Kafka client + Postgres + Elasticsearch"
    rules:
      - path: "vnshop/data/kafka/clients"
        capabilities: [read]
      - path: "vnshop/data/postgres"
        capabilities: [read]
      - path: "vnshop/data/elasticsearch"
        capabilities: [read]

  - name: vnshop-recommendations-service
    description: "Recommendations service: Kafka client + Postgres"
    rules:
      - path: "vnshop/data/kafka/clients"
        capabilities: [read]
      - path: "vnshop/data/postgres"
        capabilities: [read]

  - name: vnshop-notification-service
    description: "Notification service: MongoDB"
    rules:
      - path: "vnshop/data/mongodb"
        capabilities: [read]

  - name: vnshop-api-gateway
    description: "API Gateway: Keycloak client secret + Redis"
    rules:
      - path: "vnshop/data/keycloak"
        capabilities: [read]
      - path: "vnshop/data/api-gateway"
        capabilities: [read]
      - path: "vnshop/data/redis"
        capabilities: [read]

  - name: vnshop-ci-seeder
    description: "CI pipeline token: write-once during deploy, no read after seal"
    rules:
      - path: "vnshop/data/*"
        capabilities: [create, update]
      - path: "vnshop/metadata/*"
        capabilities: [list]

# ---------------------------------------------------------------------------
# Auth methods (recommended)
# ---------------------------------------------------------------------------
auth_methods:
  - type: kubernetes
    path: kubernetes
    description: "Each k8s ServiceAccount maps to a Vault role and policy"
    roles:
      - name: vnshop-order-service
        bound_service_account_names: ["order-service"]
        bound_service_account_namespaces: ["vnshop"]
        policies: ["vnshop-order-service"]
        ttl: 1h
      - name: vnshop-payment-service
        bound_service_account_names: ["payment-service"]
        bound_service_account_namespaces: ["vnshop"]
        policies: ["vnshop-payment-service"]
        ttl: 1h
      - name: vnshop-kafka-broker
        bound_service_account_names: ["kafka"]
        bound_service_account_namespaces: ["vnshop"]
        policies: ["vnshop-kafka-broker"]
        ttl: 1h
      # Add remaining services following the same pattern

  - type: approle
    path: approle
    description: "Fallback for non-k8s environments (staging, local Vault agent)"
    roles:
      - name: vnshop-ci-seeder
        policies: ["vnshop-ci-seeder"]
        secret_id_ttl: 10m
        token_ttl: 20m
        token_max_ttl: 30m
