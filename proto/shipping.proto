syntax = "proto3";
package vnshop.shipping;
option java_multiple_files = true;
option java_package = "com.vnshop.proto.shipping";

import "common.proto";

service ShippingService {
  rpc RequestShipping(ShippingRequest) returns (ShippingResponse);
}

message ShippingAddress {
  string full_name = 1;
  string phone = 2;
  string street = 3;
  string city = 4;
  string province = 5;
}

message SubOrderItem {
  string product_id = 1;
  string variant = 2;
  int32 quantity = 3;
}

message SubOrder {
  string seller_id = 1;
  repeated SubOrderItem items = 2;
  ShippingAddress shipping_address = 3;
}

message ShippingRequest {
  string order_id = 1;
  repeated SubOrder sub_orders = 2;
}

message ShippingLabel {
  string tracking_code = 1;
  string carrier = 2;
  string estimated_delivery = 3;
}

message ShippingResponse {
  bool success = 1;
  repeated ShippingLabel labels = 2;
}
