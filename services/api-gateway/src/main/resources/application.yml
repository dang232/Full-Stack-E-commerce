server:
  port: 8080

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8085/realms/vnshop}
      client:
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8085/realms/vnshop}
        registration:
          keycloak:
            provider: keycloak
            client-id: ${GATEWAY_OAUTH2_CLIENT_ID:api-gateway}
            client-secret: ${GATEWAY_OAUTH2_CLIENT_SECRET:}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: openid,profile,email
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            # Comma-separated list. Default covers the local SPA dev/preview ports.
            # In production set GATEWAY_CORS_ALLOWED_ORIGINS to the canonical origin(s).
            allowed-origins: ${GATEWAY_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
            allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
            allowed-headers: "*"
            exposed-headers: X-Correlation-Id
            allow-credentials: false
            max-age: 3600

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces

otel:
  traces:
    exporter: jaeger
  exporter:
    jaeger:
      endpoint: http://localhost:14250
  sdk:
    trace:
      sampler:
        probability: 0.1

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
    instances:
      product-service:
        base-config: default
      search-service:
        base-config: default
      inventory-service:
        base-config: default
      user-service:
        base-config: default
      cart-service:
        base-config: default
      order-service:
        base-config: default
      payment-service:
        base-config: default
      shipping-service:
        base-config: default
      notification-service:
        base-config: default
      # DEPRECATED - standalone coupon/review/seller-finance routes migrated to order-service/product-service.
      # Rollback: restore matching RouteConfig targets before re-enabling these circuit breakers.

---
spring:
  config:
    activate:
      on-profile: dev

otel:
  sdk:
    trace:
      sampler:
        probability: 1.0
