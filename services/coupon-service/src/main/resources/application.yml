server:
  port: 8088
spring:
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/vnshop?currentSchema=coupon_svc
    username: vnshop
    password: ${DB_PASSWORD:vnshop123}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3
      connection-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: coupon-svc-pool
  jpa:
    hibernate:
      ddl-auto: update
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:vnshop123}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
