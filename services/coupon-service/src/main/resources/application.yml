server:
  port: 8088

spring:
  application:
    name: coupon-service
  datasource:
    url: jdbc:postgresql://localhost:5432/vnshop?currentSchema=coupon_svc
    username: vnshop
    password: vnshop
  data:
    redis:
      host: localhost
      port: 6379
  flyway:
    enabled: true
    schemas: coupon_svc
    default-schema: coupon_svc
  kafka:
    bootstrap-servers: localhost:9092

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
