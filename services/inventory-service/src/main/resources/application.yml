server:
  port: 8083

spring:
  config:
    import: classpath:application-grpc.yml
  application:
    name: inventory-service
  datasource:
    url: jdbc:postgresql://localhost:5437/vnshop_inventory?currentSchema=inventory_svc
    username: vnshop
    password: vnshop
  data:
    redis:
      host: localhost
      port: 6379
  flyway:
    enabled: true
    schemas: inventory_svc
    default-schema: inventory_svc
  jpa:
    hibernate:
      ddl-auto: validate
  kafka:
    bootstrap-servers: localhost:9092
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:9090/realms/vnshop}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces

otel:
  traces:
    exporter: jaeger
  exporter:
    jaeger:
      endpoint: http://localhost:14250
  sdk:
    trace:
      sampler:
        probability: 0.1

---
spring:
  config:
    activate:
      on-profile: dev

otel:
  sdk:
    trace:
      sampler:
        probability: 1.0
