server:
  port: 8091

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://localhost:5432/vnshop?currentSchema=order_svc
    username: vnshop
    password: vnshop
  flyway:
    enabled: true
    schemas: order_svc
    default-schema: order_svc
  kafka:
    bootstrap-servers: localhost:9092
  data:
    redis:
      host: localhost
      port: 6379
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:9090/realms/vnshop}

vnshop:
  idempotency:
    ttl: 24h

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

outbox:
  publisher:
    poll-interval-ms: 1000
    batch-size: 50

management:
  endpoints:
    web:
      exposure:
        include: health,info
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
