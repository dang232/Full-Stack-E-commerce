server:
  port: 8091

spring:
  threads:
    virtual:
      enabled: true
  config:
    import: classpath:application-grpc.yml
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://localhost:5435/vnshop_order?currentSchema=order_svc
    username: vnshop
    password: ${DB_PASSWORD:vnshop}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: order-svc-pool
  flyway:
    enabled: true
    schemas: order_svc
    default-schema: order_svc
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:SASL_SSL}
      sasl.mechanism: PLAIN
      sasl.jaas.config: org.apache.kafka.common.security.plain.PlainLoginModule required username="${KAFKA_SASL_USERNAME:svc-order}" password="${KAFKA_SASL_PASSWORD:order-secret-change-me}";
      ssl.truststore.location: ${KAFKA_SSL_TRUSTSTORE_LOCATION:/etc/kafka/secrets/kafka.truststore.jks}
      ssl.truststore.password: ${KAFKA_SSL_TRUSTSTORE_PASSWORD:kafka-ssl-dev-password}
      ssl.endpoint.identification.algorithm: ""
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      # OutboxEvent + saga events are domain records; without an explicit
      # JsonSerializer here the producer falls back to StringSerializer and
      # every outbox publish fails with ClassCastException, leaving the
      # OrderSummaryProjection table empty.
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    listener:
      observation-enabled: true
    template:
      observation-enabled: true
  data:
    web:
      pageable:
        max-page-size: 50
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:vnshop123}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:9090/realms/vnshop}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://keycloak:8080/realms/vnshop/protocol/openid-connect/certs}

vnshop:
  idempotency:
    ttl: 24h
  commission:
    tiers:
      STANDARD: "0.10"
      VERIFIED: "0.08"
      PREFERRED: "0.05"
      MALL: "0.03"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

outbox:
  publisher:
    poll-interval-ms: 1000
    batch-size: 50
    max-attempts: 8
    send-timeout-ms: 5000

saga:
  compensation-timeout-ms: 300000
  compensation-finalizer-interval-ms: 60000

resilience4j:
  circuitbreaker:
    configs:
      grpcDefault:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-duration-threshold: 4s
        slow-call-rate-threshold: 80
        record-exceptions:
          - io.grpc.StatusRuntimeException
          - java.util.concurrent.TimeoutException
    instances:
      inventoryService:
        base-config: grpcDefault
      paymentService:
        base-config: grpcDefault
        wait-duration-in-open-state: 15s
      shippingService:
        base-config: grpcDefault

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
      group:
        readiness:
          include: readinessState,db,kafka
        liveness:
          include: livenessState
  health:
    circuitbreakers:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces

otel:
  traces:
    exporter: jaeger
  exporter:
    jaeger:
      endpoint: http://localhost:14250
  sdk:
    trace:
      sampler:
        probability: 0.1

---
spring:
  config:
    activate:
      on-profile: dev

otel:
  sdk:
    trace:
      sampler:
        probability: 1.0
