server:
  port: 8082

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: product-service
  datasource:
    url: jdbc:postgresql://localhost:5434/vnshop_product?currentSchema=product_svc
    username: vnshop
    password: ${DB_PASSWORD:vnshop}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5
      connection-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: product-svc-pool
  data:
    web:
      pageable:
        max-page-size: 50
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:vnshop123}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:SASL_SSL}
      sasl.mechanism: PLAIN
      sasl.jaas.config: org.apache.kafka.common.security.plain.PlainLoginModule required username="${KAFKA_SASL_USERNAME:svc-product}" password="${KAFKA_SASL_PASSWORD:product-secret-change-me}";
      ssl.truststore.location: ${KAFKA_SSL_TRUSTSTORE_LOCATION:/etc/kafka/secrets/kafka.truststore.jks}
      ssl.truststore.password: ${KAFKA_SSL_TRUSTSTORE_PASSWORD:kafka-ssl-dev-password}
      ssl.endpoint.identification.algorithm: ""
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      # ProductEvent is a domain record; JsonSerializer turns it into bytes on
      # the wire. Spring Kafka's default StringSerializer (and did) threw
      # ClassCastException on every product create/update before this.
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
  flyway:
    enabled: true
    schemas: product_svc
    default-schema: product_svc
  jpa:
    hibernate:
      ddl-auto: validate
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:9090/realms/vnshop}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://keycloak:8080/realms/vnshop/protocol/openid-connect/certs}

springdoc:
  api-docs:
    path: /api-docs
    enabled: ${SWAGGER_ENABLED:false}
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${SWAGGER_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces

otel:
  traces:
    exporter: jaeger
  exporter:
    jaeger:
      endpoint: http://localhost:14250
  sdk:
    trace:
      sampler:
        probability: 0.1

---
spring:
  config:
    activate:
      on-profile: dev

otel:
  sdk:
    trace:
      sampler:
        probability: 1.0
