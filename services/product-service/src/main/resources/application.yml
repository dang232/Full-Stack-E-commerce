server:
  port: 8082

spring:
  application:
    name: product-service
  datasource:
    url: jdbc:postgresql://localhost:5432/vnshop?currentSchema=product_svc
    username: vnshop
    password: vnshop
  data:
    redis:
      host: localhost
      port: 6379
  flyway:
    enabled: true
    schemas: product_svc
    default-schema: product_svc

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
