server:
  port: 8090

spring:
  application:
    name: seller-finance-service
  datasource:
    url: jdbc:postgresql://localhost:5432/vnshop?currentSchema=seller_finance_svc
    username: vnshop
    password: vnshop
  flyway:
    enabled: true
    schemas: seller_finance_svc
    default-schema: seller_finance_svc
  kafka:
    bootstrap-servers: localhost:9092

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
