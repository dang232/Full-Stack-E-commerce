server:
  port: 8090

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: seller-finance-service
  datasource:
    url: jdbc:postgresql://localhost:5432/vnshop?currentSchema=seller_finance_svc
    username: vnshop
    password: ${DB_PASSWORD:vnshop}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3
      connection-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: seller-finance-svc-pool
  flyway:
    enabled: true
    schemas: seller_finance_svc
    default-schema: seller_finance_svc
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:SASL_SSL}
      sasl.mechanism: PLAIN
      sasl.jaas.config: org.apache.kafka.common.security.plain.PlainLoginModule required username="${KAFKA_SASL_USERNAME:svc-finance}" password="${KAFKA_SASL_PASSWORD:finance-secret-change-me}";
      ssl.truststore.location: ${KAFKA_SSL_TRUSTSTORE_LOCATION:/etc/kafka/secrets/kafka.truststore.jks}
      ssl.truststore.password: ${KAFKA_SSL_TRUSTSTORE_PASSWORD:kafka-ssl-dev-password}
      ssl.endpoint.identification.algorithm: ""
    listener:
      observation-enabled: true
    template:
      observation-enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:9090/realms/vnshop}

          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://keycloak:8080/realms/vnshop/protocol/openid-connect/certs}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
      group:
        readiness:
          include: readinessState,db,kafka
        liveness:
          include: livenessState
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces

kafka:
  health:
    consumer:
      enabled: true
      lag-threshold: 1000
      group-id: seller-finance-service-refund

vnshop:
  commission:
    tiers:
      STANDARD: "0.10"
      VERIFIED: "0.08"
      PREFERRED: "0.05"
      MALL: "0.03"
