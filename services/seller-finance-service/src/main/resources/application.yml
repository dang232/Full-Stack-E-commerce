server:
  port: 8090

spring:
  application:
    name: seller-finance-service
  datasource:
    url: jdbc:postgresql://localhost:5432/vnshop?currentSchema=seller_finance_svc
    username: vnshop
    password: ${SPRING_DATASOURCE_PASSWORD:vnshop123}
  flyway:
    enabled: true
    schemas: seller_finance_svc
    default-schema: seller_finance_svc
  kafka:
    bootstrap-servers: localhost:9092
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:9090/realms/vnshop}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces

vnshop:
  commission:
    tiers:
      STANDARD: "0.10"
      VERIFIED: "0.08"
      PREFERRED: "0.05"
      MALL: "0.03"
