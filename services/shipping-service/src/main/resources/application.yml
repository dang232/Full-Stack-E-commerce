server:
  port: 8093

spring:
  threads:
    virtual:
      enabled: true
  config:
    import: classpath:application-grpc.yml
  application:
    name: shipping-service
  datasource:
    url: jdbc:postgresql://localhost:5439/vnshop_shipping?currentSchema=shipping_svc
    username: vnshop
    password: ${DB_PASSWORD:vnshop}
  flyway:
    enabled: true
    schemas: shipping_svc
    default-schema: shipping_svc
  jpa:
    hibernate:
      ddl-auto: validate
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:SASL_PLAINTEXT}
      sasl.mechanism: PLAIN
      sasl.jaas.config: org.apache.kafka.common.security.plain.PlainLoginModule required username="${KAFKA_SASL_USERNAME:svc-shipping}" password="${KAFKA_SASL_PASSWORD:shipping-secret-change-me}";
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

shipping:
  carrier:
    mode: ${CARRIER_MODE:stub}
    ghn:
      base-url: ${GHN_BASE_URL:https://dev-online-gateway.ghn.vn}
      token: ${GHN_TOKEN:}
      shop-id: ${GHN_SHOP_ID:}
      service-type-id: ${GHN_SERVICE_TYPE_ID:2}
    ghtk:
      base-url: ${GHTK_BASE_URL:https://services.giaohangtietkiem.vn}
      token: ${GHTK_TOKEN:}
      partner-code: ${GHTK_PARTNER_CODE:}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces

otel:
  traces:
    exporter: jaeger
  exporter:
    jaeger:
      endpoint: http://localhost:14250
  sdk:
    trace:
      sampler:
        probability: 0.1

---
spring:
  config:
    activate:
      on-profile: dev

otel:
  sdk:
    trace:
      sampler:
        probability: 1.0
