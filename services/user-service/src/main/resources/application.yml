server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://localhost:5433/vnshop_user?currentSchema=user_svc
    username: vnshop
    password: vnshop
  flyway:
    enabled: true
    schemas: user_svc
    default-schema: user_svc
  jpa:
    hibernate:
      ddl-auto: validate
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:9090/realms/vnshop}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://keycloak:8080/realms/vnshop/protocol/openid-connect/certs}

# Service-account credentials for the Keycloak Admin API. Used by AuthController
# to create users on POST /auth/register. The realm import in
# infra/keycloak/vnshop-realm.json defines the matching client.
keycloak:
  admin:
    base-url: ${KEYCLOAK_ADMIN_BASE_URL:http://keycloak:8080}
    realm: ${KEYCLOAK_ADMIN_REALM:vnshop}
    client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:vnshop-admin-api}
    client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:vnshop-admin-api-secret}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces

otel:
  traces:
    exporter: jaeger
  exporter:
    jaeger:
      endpoint: http://localhost:14250
  sdk:
    trace:
      sampler:
        probability: 0.1

---
spring:
  config:
    activate:
      on-profile: dev

otel:
  sdk:
    trace:
      sampler:
        probability: 1.0
