server:
  port: 8081

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://localhost:5433/vnshop_user?currentSchema=user_svc
    username: vnshop
    password: ${DB_PASSWORD:vnshop}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: user-svc-pool
  flyway:
    enabled: true
    schemas: user_svc
    default-schema: user_svc
  jpa:
    hibernate:
      ddl-auto: validate
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:9090/realms/vnshop}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://keycloak:8080/realms/vnshop/protocol/openid-connect/certs}

# Service-account credentials for the Keycloak Admin API. Used by AuthController
# to create users on POST /auth/register. The realm import in
# infra/keycloak/vnshop-realm.json defines the matching client.
vnshop:
  product-service:
    uri: ${PRODUCT_SERVICE_URI:http://product-service:8082}
    connect-timeout-ms: ${PRODUCT_SERVICE_CONNECT_TIMEOUT_MS:1000}
    read-timeout-ms: ${PRODUCT_SERVICE_READ_TIMEOUT_MS:2500}
    cache-ttl-seconds: ${PRODUCT_SERVICE_CACHE_TTL_SECONDS:300}
    cache-max-entries: ${PRODUCT_SERVICE_CACHE_MAX_ENTRIES:10000}

# Resilience around outbound calls to product-service. The breaker latches open
# after sustained failures so a slow product-service can't stall the SellerShowcase
# query, and the retry handles transient 5xx without amplifying load (200ms base
# with exponential backoff over 3 attempts).
resilience4j:
  circuitbreaker:
    instances:
      product-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
  retry:
    instances:
      product-service:
        max-attempts: 3
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - org.springframework.web.client.HttpServerErrorException
          - org.springframework.web.client.ResourceAccessException
          - java.io.IOException

keycloak:
  admin:
    base-url: ${KEYCLOAK_ADMIN_BASE_URL:http://keycloak:8080}
    realm: ${KEYCLOAK_ADMIN_REALM:vnshop}
    client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:vnshop-admin-api}
    client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:vnshop-admin-api-secret-dev}

springdoc:
  api-docs:
    path: /api-docs
    enabled: ${SWAGGER_ENABLED:false}
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${SWAGGER_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  health:
    circuitbreakers:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces

otel:
  traces:
    exporter: jaeger
  exporter:
    jaeger:
      endpoint: http://localhost:14250
---
spring:
  config:
    activate:
      on-profile: dev

# otel.sdk.trace.sampler.probability removed — use OTEL_TRACES_SAMPLER_ARG env var instead
